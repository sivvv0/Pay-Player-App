name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: |
        npm install
        npm install -D typescript
    
    - name: Build web app
      run: |
        mkdir -p www
        echo '<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pay-Player</title>
        </head>
        <body>
            <h1>Pay-Player</h1>
            <p>Loading...</p>
        </body>
        </html>' > www/index.html
    
    - name: Remove existing Android platform (if any)
      run: rm -rf android || true  # ← ADD THIS LINE
    
    - name: Add Android platform
      run: npx cap add android  # ← This will now work
    
    - name: Sync Capacitor
      run: npx cap sync
    
    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Pay-Player-Debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
